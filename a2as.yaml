files:
  base_storage_path:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  file_path:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [f]
  knowledge_base.json:
    type: literal
    actions: [read]
    params:
      caller: [_get_storage_path]
      path: [self.base_storage_path]
  leads.json:
    type: literal
    actions: [read]
    params:
      caller: [collect_metrics, schedule_meeting]
      path: [Path]
  leads_dir:
    type: variable
    actions: [write]
    params:
      caller: [leads_dir.mkdir]
  leads_file:
    type: variable
    actions: [read, write]
    params:
      caller: [open, json.load]
      alias: [f]
  reports_dir:
    type: variable
    actions: [write]
    params:
      caller: [reports_dir.mkdir]
  storage_path:
    type: variable
    actions: [write, read]
    params:
      caller: [storage_path.parent.mkdir, open, json.load]
