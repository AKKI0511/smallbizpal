agents:
  business_discovery_agent:
    type: instance
    models: [gemini-2.0-flash]
    params:
      name: CustomerEngagementAgent
      instruction: ['You are SmallBizPal''s central coordinator, an AI assistant designed to help small businesses succeed.',
        'You coordinate a team of specialized agents to provide comprehensive business support:', '1. Business Discovery Agent:
          Conducts interviews to understand the business, goals, and target audience', '2. Marketing Generator Agent: Creates
          marketing materials and content', '3. Customer Engagement Agent: Handles customer interactions and lead management',
        '4. Performance Reporting Agent: Provides insights and reports on business activities', 'Your role is to:', '- Understand
          user requests and determine the best approach', '- Route tasks to the most appropriate specialized agent', '- Coordinate
          between agents when complex tasks require multiple specialties', '- Provide direct assistance for general business
          questions', '- Ensure a smooth and professional user experience', 'When a user asks for help:', 1. Analyze their
          request to understand the core need, 2. Determine which specialized agent can best assist them, 3. Delegate to that
          agent or handle directly if it's a general inquiry, '4. For business profiling and discovery, use the Business Discovery
          Agent', '5. Always be helpful, professional, and focused on driving business success', 'Remember: You are the user''s
          primary point of contact, so maintain a welcoming and supportive tone.']
      description: AI-powered customer engagement agent that helps convert website visitors and social media interactions
        into qualified leads through helpful conversations and meeting scheduling.
  content_creation_agent:
    type: instance
    models: [gemini-2.0-flash]
    params:
      name: CONTENT_CREATION_AGENT_CONFIG[name]
      description: CONTENT_CREATION_AGENT_CONFIG[description]
      instruction: CONTENT_CREATION_AGENT_CONFIG[instruction]
      input_schema: CONTENT_CREATION_AGENT_CONFIG[input_schema]
      output_schema: CONTENT_CREATION_AGENT_CONFIG[output_schema]
      output_key: CONTENT_CREATION_AGENT_CONFIG[output_key]
      disallow_transfer_to_parent: CONTENT_CREATION_AGENT_CONFIG[disallow_transfer_to_parent]
      disallow_transfer_to_peers: CONTENT_CREATION_AGENT_CONFIG[disallow_transfer_to_peers]
  kb_proxy_agent:
    type: instance
    models: [MODEL_NAME]
    tools: [search_private_kb]
    params:
      name: KB_PROXY_CONFIG[name]
      instruction: KB_PROXY_CONFIG[instruction]
      description: KB_PROXY_CONFIG[description]
  marketing_generator_agent:
    type: instance
    models: [MODEL_NAME]
    tools: [retrieve_business_profile, agent_tool]
    params:
      name: MARKETING_GENERATOR_CONFIG[name]
      description: MARKETING_GENERATOR_CONFIG[description]
      instruction: MARKETING_GENERATOR_CONFIG[instruction]
      planner: PlanReActPlanner
      after_tool_callback: content_storage_callback
  performance_reporting_agent:
    type: instance
    models: [MODEL_NAME]
    tools: [collect_metrics, store_report]
    params:
      name: PERFORMANCE_REPORTING_CONFIG[name]
      description: PERFORMANCE_REPORTING_CONFIG[description]
      instruction: PERFORMANCE_REPORTING_CONFIG[instruction].format(date=datetime.now.strftime('%Y-%m-%d'))
      output_key: performance_report
  root_agent.0:
    type: instance
    models: [MODEL_NAME]
    tools: [ask_internal_kb, schedule_meeting]
    params:
      name: CUSTOMER_ENGAGEMENT_CONFIG[name]
      instruction: CUSTOMER_ENGAGEMENT_CONFIG[instruction]
      description: CUSTOMER_ENGAGEMENT_CONFIG[description]
      instance: root_agent
  root_agent.1:
    type: instance
    models: [gemini-2.0-flash-lite]
    params:
      name: OrchestratorAgent
      instruction: ['You are SmallBizPal''s central coordinator, an AI assistant designed to help small businesses succeed.',
        'You coordinate a team of specialized agents to provide comprehensive business support:', '1. Business Discovery Agent:
          Conducts interviews to understand the business, goals, and target audience', '2. Marketing Generator Agent: Creates
          marketing materials and content', '3. Customer Engagement Agent: Handles customer interactions and lead management',
        '4. Performance Reporting Agent: Provides insights and reports on business activities', 'Your role is to:', '- Understand
          user requests and determine the best approach', '- Route tasks to the most appropriate specialized agent', '- Coordinate
          between agents when complex tasks require multiple specialties', '- Provide direct assistance for general business
          questions', '- Ensure a smooth and professional user experience', 'When a user asks for help:', 1. Analyze their
          request to understand the core need, 2. Determine which specialized agent can best assist them, 3. Delegate to that
          agent or handle directly if it's a general inquiry, '4. For business profiling and discovery, use the Business Discovery
          Agent', '5. Always be helpful, professional, and focused on driving business success', 'Remember: You are the user''s
          primary point of contact, so maintain a welcoming and supportive tone.']
      description: Coordinates all business assistance tasks and routes requests to specialized agents
      instance: root_agent
      sub_agents: [business_discovery_agent, marketing_generator_agent, kb_proxy_agent, performance_reporting_agent]

models:
  gemini-2.0-flash:
    type: literal
    agents: [content_creation_agent, business_discovery_agent]
  gemini-2.0-flash-lite:
    type: literal
    agents: [root_agent.1]
  MODEL_NAME:
    type: literal
    agents: [root_agent.0, kb_proxy_agent, marketing_generator_agent, performance_reporting_agent]

tools:
  agent_tool:
    type: agent
    agents: [marketing_generator_agent]
    params:
      wrapper: AgentTool
  ask_internal_kb:
    type: function
    agents: [root_agent.0]
    params:
      description: |-
        Asks the internal knowledge base for information about the business.
        This uses A2A communication to securely access private business data.

        Args:
            query: The customer's question about the business.

        Returns:
            Relevant information from the internal knowledge base.
  collect_metrics:
    type: function
    agents: [performance_reporting_agent]
    params:
      description: |-
        Collect performance metrics from the knowledge base for a specific date.

        Args:
            tool_context: The context of the tool.
            run_date: Date to collect metrics for (YYYY-MM-DD format).
                     Defaults to today if not provided.

        Returns:
            Dictionary containing collected metrics data
  retrieve_business_profile:
    type: function
    agents: [marketing_generator_agent]
    params:
      description: |-
        Retrieve the current business profile for marketing content generation.

        Args:
            tool_context: The context of the tool.

        Returns:
            Dictionary containing business profile data including:
            - business_name: Name of the business
            - industry: Business industry/sector
            - target_audience: Description of target customers
            - unique_value_proposition: What makes the business unique
            - brand_voice: Tone and personality for communications
            - products_services: List of products/services offered
            - business_goals: Current business objectives
            - marketing_budget: Available marketing budget
            - current_marketing_activities: Existing marketing efforts
            - social_media_presence: Current social media accounts
            - competitive_advantages: Key differentiators

        Raises:
            Exception: If no business profile is found
  schedule_meeting:
    type: function
    agents: [root_agent.0]
    params:
      description: |-
        Schedules a meeting with the business owner for a potential customer.

        Args:
            name: The name of the potential customer.
            email: The email address of the potential customer.
            topic: The topic or reason for the meeting.
            tool_context: The context of the tool.
            preferred_time: Optional preferred time for the meeting.

        Returns:
            A confirmation message to be shown to the user.
  search_private_kb:
    type: function
    agents: [kb_proxy_agent]
    params:
      description: |-
        Searches the private knowledge base for information relevant to the query.

        For MVP, this simply returns the entire business profile data.
        Later this will be upgraded to vector search with RAG.

        Args:
            query: The search query from the customer engagement agent
            tool_context: The context of the tool.

        Returns:
            Complete business profile data from the knowledge base
  store_report:
    type: function
    agents: [performance_reporting_agent]
    params:
      description: |-
        Store a markdown report in the reports directory.

        Args:
            markdown_content: The generated markdown report content
            report_date: Date of the report in YYYY-MM-DD format
            tool_context: The context of the tool.

        Returns:
            Dictionary with storage status and file path information

teams:
  root_agent.1:
    type: hierarchy
    agents: [root_agent.1, business_discovery_agent, marketing_generator_agent, kb_proxy_agent, performance_reporting_agent]

